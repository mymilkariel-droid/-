<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Hati Animasi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050510; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .title-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; text-align: center; pointer-events: none; }
        h1 { color: #ffffff; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px rgba(255, 0, 128, 0.8), 0 0 30px rgba(0, 191, 255, 0.5); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>
    <div class="title-container"><h1>Galaxy of Love</h1></div>
    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const particles = [];
        const particleCount = 2000;
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * 12, y: -y * 12 };
        }
        class Particle {
            constructor() { this.reset(); }
            reset() {
                const t = Math.random() * Math.PI * 2;
                const target = getHeartPoint(t);
                const randomOffset = (Math.random() - 0.5) * 50;
                this.targetX = width / 2 + target.x + (Math.random() - 0.5) * randomOffset;
                this.targetY = height / 2 + target.y + (Math.random() - 0.5) * randomOffset;
                this.x = width / 2; this.y = height / 2;
                this.size = Math.random() * 2 + 0.5;
                this.speed = Math.random() * 0.02 + 0.005;
                const colors = ['#ff0055', '#ff55aa', '#aa00ff', '#00bfff', '#00ffff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random();
                this.twinkleSpeed = Math.random() * 0.05 + 0.01;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.alpha += this.twinkleSpeed;
                if (this.alpha > 1 || this.alpha < 0.2) this.twinkleSpeed = -this.twinkleSpeed;
                const dist = Math.hypot(this.targetX - this.x, this.targetY - this.y);
                if (dist < 5 && Math.random() < 0.005) this.reset();
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color;
                ctx.shadowBlur = 5; ctx.shadowColor = this.color; ctx.fill(); ctx.restore();
            }
        }
        function init() { for (let i = 0; i < particleCount; i++) particles.push(new Particle()); }
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.15)'; ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
            particles.length = 0; init();
        });
        init(); animate();
    </script>
</body>
  </html>
